<header class="topbar">

    <div class="topbar-left">

        <!-- Hamburger / sidebar toggle (uses the hidden checkbox in base.html) -->
        <label for="sidebarToggle" class="sidebar-toggle" title="Toggle sidebar" aria-hidden="true">
            <i class="fa-solid fa-bars"></i>
        </label>

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input

                type="text"

                placeholder="Search Complaint, FIR, IPC, BNS, Officer..."

            >

        </div>

    </div>

    <div class="topbar-right">

        <!-- AI Status -->

        <div class="topbar-card ai-online">

            <span class="pulse"></span>

            Gemini AI Online

        </div>

        <!-- Time -->

        <div class="topbar-card">

            <i class="fa-regular fa-clock"></i>

            <span id="liveClock">

                Loading...

            </span>

        </div>

        <!-- Notifications -->

        <div class="icon-button">

            <i class="fa-solid fa-bell"></i>

            <span class="notification-count">

                3

            </span>

        </div>

        <!-- Messages -->

        <div class="icon-button">

            <i class="fa-solid fa-envelope"></i>

            <span class="notification-count">

                5

            </span>

        </div>

        <!-- Profile -->

        <div class="profile-card">

            <img

                src="https://ui-avatars.com/api/?name=UP+Police&background=2563eb&color=ffffff"

                alt="Officer"

            >

            <div>

                <h5>

                    Investigating Officer

                </h5>

                <span>

                    Uttar Pradesh Police

                </span>

            </div>

        </div>

    </div>

</header>
